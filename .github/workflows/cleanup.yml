name: Cleanup Old Articles

on:
  schedule:
    - cron: '0 3 * * 0'  # 3 AM UTC every Sunday (8:30 AM IST)
  workflow_dispatch:      # allow manual trigger from GitHub UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Delete old read articles
        run: |
          echo "🧹 Running cleanup..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"days_to_keep": 60}' \
            https://myreadfeed.vercel.app/api/cleanup)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Cleanup failed with status $HTTP_CODE"
            exit 1
          fi

          DELETED=$(echo "$BODY"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('deleted',0))"    2>/dev/null || echo "?")
          REMAINING=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('remaining',0))"  2>/dev/null || echo "?")

          echo ""
          echo "📊 Summary"
          echo "   🗑️  Articles deleted  : $DELETED"
          echo "   📄 Articles remaining : $REMAINING"