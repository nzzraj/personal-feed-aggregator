name: Daily Cleanup

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clean up old articles
        run: |
          echo "🧹 Starting cleanup..."
          
          # Using Supabase SQL API via curl
          CLEANUP_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_JWT }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://[YOUR_SUPABASE_URL]/rest/v1/rpc/cleanup_old_articles?days_to_keep=90)
          
          echo "Cleanup response:"
          echo "$CLEANUP_RESPONSE"
          
          # Alternative: Call via pg_dump/psql if you have credentials
          # PGPASSWORD="${{ secrets.POSTGRES_PASSWORD }}" psql \
          #   -h ${{ secrets.POSTGRES_HOST }} \
          #   -U postgres \
          #   -d postgres \
          #   -c "SELECT cleanup_old_articles(90);"

      - name: Verify cleanup
        run: |
          echo "✅ Cleanup completed"
