name: Refresh Feeds

on:
  schedule:
    - cron: '30 2 * * *'  # 2:30 AM UTC daily (8:00 AM IST)
    - cron: '30 14 * * *' # 2:30 PM UTC daily (8:00 PM IST)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger feed refresh
        run: |
          echo "🔄 Refreshing feeds..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.API_KEY }}" \
            -H "Content-Type: application/json" \
            https://myreadfeed.vercel.app/api/refresh)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Refresh failed with status $HTTP_CODE"
            exit 1
          fi

          INSERTED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('articlesInserted',0))" 2>/dev/null || echo "?")
          SUCCESS=$(echo "$BODY"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',0))"           2>/dev/null || echo "?")
          FAILED=$(echo "$BODY"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))"            2>/dev/null || echo "?")
          DURATION=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('duration','?'))"        2>/dev/null || echo "?")

          echo ""
          echo "📊 Summary"
          echo "   ✅ Sources OK : $SUCCESS"
          echo "   ❌ Sources failed : $FAILED"
          echo "   📄 Articles inserted : $INSERTED"
          echo "   ⏱️  Duration : $DURATION"